<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Main ticket shape -->
  <rect x="10" y="20" width="280" height="110" rx="15" ry="15" fill="#6B46C1" stroke="#553C9A" stroke-width="2"/>
  
  <!-- Left side perforation -->
  <line x1="50" y1="20" x2="50" y2="130" stroke-dasharray="5,5" stroke="#FFF" stroke-width="2"/>
  
  <!-- Inside part of the ticket -->
  <rect x="60" y="30" width="220" height="90" rx="10" ry="10" fill="#9F7AEA" stroke="#805AD5" stroke-width="2"/>
  
  <!-- Ticket text -->
  <text x="160" y="70" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RAFFLE TICKET</text>
  
  <!-- Ticket number -->
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">#12345</text>
  
  <!-- Stars for decoration -->
  <polygon points="30,40 33,45 40,45 34,50 37,55 30,52 23,55 26,50 20,45 27,45" fill="#FFFFFF"/>
  <polygon points="30,100 33,105 40,105 34,110 37,115 30,112 23,115 26,110 20,105 27,105" fill="#FFFFFF"/>
  
  <!-- Circular punch mark -->
  <circle cx="30" cy="70" r="10" fill="#553C9A" stroke="#FFFFFF" stroke-width="2"/>
</svg> 